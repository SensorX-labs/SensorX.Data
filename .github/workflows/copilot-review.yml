name: Add Copilot Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  add-copilot:
    name: Add Copilot as Reviewer
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Copilot to PR
        run: |
          # Check if copilot is already a reviewer
          REVIEWERS=$(gh pr view ${{ github.event.pull_request.number }} --json reviewers --jq '.reviewers[].login' | tr '[:upper:]' '[:lower:]')
          if [[ ! "$REVIEWERS" =~ "copilot" ]]; then
            gh pr edit ${{ github.event.pull_request.number }} --add-reviewer github-copilot
          else
            echo "Copilot is already a reviewer."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
